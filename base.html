<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}ShadowEye Admin{% endblock %}</title>
<style>
  :root {
    --bg: #0d0f14;
    --bg2: #13161d;
    --bg3: #1a1e28;
    --border: rgba(255,255,255,0.07);
    --text: #e8eaf0;
    --muted: #8890a4;
    --accent: #6c63ff;
    --accent2: #8b5cf6;
    --green: #22c55e;
    --red: #ef4444;
    --amber: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { color: var(--accent2); }
  .nav { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 24px; height: 56px; }
  .nav-logo { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
  .nav-logo span { color: var(--accent); }
  .nav-links { display: flex; gap: 16px; margin-left: auto; }
  .nav-links a { color: var(--muted); font-size: 13px; }
  .nav-links a:hover { color: var(--text); }
  .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; }
  .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .card-body { padding: 20px; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 7px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-danger  { background: var(--red); color: #fff; }
  .btn-ghost   { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
  input, select { background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-radius: 7px; padding: 7px 12px; font-size: 13px; outline: none; transition: border-color 0.15s; }
  input:focus, select:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-red   { background: rgba(239,68,68,0.15); color: var(--red); }
  .flash { background: rgba(108,99,255,0.15); border: 1px solid rgba(108,99,255,0.3); color: var(--accent2); padding: 10px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 13px; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 10px 12px; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }
  .stat-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .stat-value { font-size: 26px; font-weight: 700; }
  .form-row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 12px; color: var(--muted); }
</style>
{% block extra_style %}{% endblock %}
</head>
<body>
<nav class="nav">
  <div class="nav-logo">👁️ <span>Shadow</span>Eye</div>
  <div class="nav-links">
    <a href="/">Пользователи</a>
    <a href="/logout">Выйти</a>
  </div>
</nav>
{% block content %}{% endblock %}
</body>
</html>
